version: '3.8'

services:
  mongo:
    image: mongo:7.0
    container_name: noqueue-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: noqueue
      MONGO_INITDB_ROOT_PASSWORD: noqueue
    volumes:
      - mongo-data:/data/db
    networks:
      - noqueue-network

  redis:
    image: redis:7-alpine
    container_name: noqueue-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - noqueue-network

  mongo-express:
    image: mongo-express:latest
    container_name: noqueue-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: noqueue
      ME_CONFIG_MONGODB_ADMINPASSWORD: noqueue
      ME_CONFIG_MONGODB_URL: mongodb://noqueue:noqueue@mongo:27017/
    depends_on:
      - mongo
    networks:
      - noqueue-network

volumes:
  mongo-data:
  redis-data:

networks:
  noqueue-network:
    driver: bridge
